<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">

    <link rel="icon" type="image/x-icon" href="./img/pokemon.png"> <!-- Favicon-->
</head>

<body onload="loadPokemon(20)">



<header class="input">
    <h1>Pokedex</h1>
    <label for="searchInput">Suche nach Pokémon:</label>
    <input type="text" id="searchInput" onkeyup="filterPokemonNamesBySearchTerm() " /> <!-- Suchfeld -->
    <button onclick="playAudio()">Play</button>
    <button onclick="pauseAudio()">Stop</button>
</header>

<div id="aboutPokemon"></div> <!-- Pokemon Infos -->

<div id="loadingBar" class="loading-bar"></div>

<footer>
    <button onclick="loadMorePokemon(20)">Weitere Pokémon laden</button>
</footer>

<div id="dialog"></div> <!-- Pokemon groß Darstellung -->

<script src="script.js"></script>
</body>
</html>
